#
# FSM descriptor for the auto machine.
# Regenerate model and TLA+ spec with:
#   python -m rxnet.tools.gen auto.yaml \
#       --py-dir  . \
#       --c-dir   ../../../../c/examples/fsm/02-auto/ \
#       --tla-dir ../../../../tlaplus/

name: auto

params:
  - name: button_gpio
    type: int
    ctype: int
  - name: light_gpio
    type: int
    ctype: int
  - name: auto_off_timeout_ms
    type: int
    ctype: "unsigned int"

states:
  - {id: 0, name: OFF}
  - {id: 1, name: ON}

initial: OFF

transitions:
  - {from: OFF, to: ON,  guard: button_pressed,   action: auto_on}
  - {from: ON,  to: ON,  guard: button_pressed,   action: auto_on}
  - {from: ON,  to: OFF, guard: auto_off_elapsed, action: auto_off}
