# FSM descriptor for the light machine.
# Regenerate model and TLA+ spec with:
#   python -m rxnet.tools.gen light.yaml \
#       --py-dir  . \
#       --c-dir   ../../../../c/examples/fsm/01-light/ \
#       --tla-dir ../../../../tlaplus/

name: light

params:
  - name: button_gpio
    type: int
    ctype: int
  - name: light_gpio
    type: int
    ctype: int

states:
  - {id: 0, name: OFF}
  - {id: 1, name: ON}

initial: OFF

transitions:
  - {from: OFF, to: ON,  guard: button_pressed, action: light_on}
  - {from: ON,  to: OFF, guard: button_pressed, action: light_off}
